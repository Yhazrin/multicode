version: "2"
sql:
  - engine: "postgresql"
    queries: "pkg/db/queries/agent_memory.sql"
    schema: "migrations/"
    gen:
      go:
        package: "db"
        out: "/tmp/sqlc_test_out"
        sql_package: "pgx/v5"
        emit_json_tags: true
        overrides:
          - db_type: "vector"
            go_type:
              import: "github.com/pgvector/pgvector-go"
              type: "Vector"
            nullable: false
          - db_type: "vector"
            go_type:
              import: "github.com/pgvector/pgvector-go"
              type: "Vector"
              pointer: true
            nullable: true
