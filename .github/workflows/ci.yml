name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Frontend lint
        run: pnpm lint

      - name: Go lint
        run: |
          cd server
          # Run go vet as a lightweight linter equivalent
          go vet ./...

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build and type check
        run: pnpm build && pnpm typecheck

      - name: Test with coverage
        run: pnpm test:coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: apps/web/coverage/
          retention-days: 7

  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: multicode
          POSTGRES_USER: multicode
          POSTGRES_PASSWORD: multicode
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U multicode -d multicode"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgres://multicode:multicode@localhost:5432/multicode?sslmode=disable
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
          cache-dependency-path: server/go.sum

      - name: Build
        run: cd server && go build ./...

      - name: Run migrations
        run: cd server && go run ./cmd/migrate up

      - name: Test with coverage
        run: cd server && go test -coverprofile=coverage.out -covermode=atomic ./...

      - name: Coverage summary
        run: cd server && go tool cover -func=coverage.out | tail -1

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: server/coverage.out
          retention-days: 7

  e2e:
    needs: [frontend, backend]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: multicode
          POSTGRES_USER: multicode
          POSTGRES_PASSWORD: multicode
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U multicode -d multicode"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgres://multicode:multicode@localhost:5432/multicode?sslmode=disable
      PORT: 8080
      FRONTEND_PORT: 3000
      PLAYWRIGHT_BASE_URL: http://localhost:3000
      APP_ENV: development
      JWT_SECRET: test-jwt-secret-for-ci-only
      ALLOW_DEV_MASTER_CODE: "true"
      POSTGRES_DB: multicode
      POSTGRES_USER: multicode
      POSTGRES_PASSWORD: multicode
      POSTGRES_PORT: 5432
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run backend migrations
        run: cd server && go run ./cmd/migrate up

      - name: Start backend
        run: |
          cd server
          go run ./cmd/server > /tmp/backend.log 2>&1 &
          echo $! > /tmp/backend.pid
        shell: bash

      - name: Wait for backend health
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "Backend ready"
              exit 0
            fi
            sleep 1
          done
          echo "Backend failed to start"
          cat /tmp/backend.log
          exit 1
        shell: bash

      - name: Start frontend
        run: |
          pnpm dev:web > /tmp/frontend.log 2>&1 &
          echo $! > /tmp/frontend.pid
        shell: bash

      - name: Wait for frontend
        run: |
          for i in $(seq 1 90); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Frontend ready"
              exit 0
            fi
            sleep 1
          done
          echo "Frontend failed to start"
          cat /tmp/frontend.log
          exit 1
        shell: bash

      - name: Run E2E smoke tests
        run: pnpm exec playwright test
        shell: bash

      - name: Stop services
        if: always()
        run: |
          [ -f /tmp/backend.pid ] && kill $(cat /tmp/backend.pid) 2>/dev/null || true
          [ -f /tmp/frontend.pid ] && kill $(cat /tmp/frontend.pid) 2>/dev/null || true
        shell: bash
