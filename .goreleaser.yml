version: 2

project_name: alphenix

builds:
  - id: alphenix
    main: ./cmd/alphenix
    dir: server
    binary: alphenix
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - name: alphenix
    repository:
      owner: multica-ai
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/multica-ai/alphenix"
    description: "Alphenix CLI — local agent runtime and management tool for the Alphenix platform"
    license: "Apache-2.0"
    install: |
      bin.install "alphenix"
    test: |
      system "#{bin}/alphenix", "version"
